name: industrial_safety
description: World-Class Industrial Safety Monitoring App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    
  # State Management
  flutter_bloc: ^8.1.3
  provider: ^6.1.1
  
  # UI & Animations
  lottie: ^2.5.0
  fl_chart: ^0.66.0
  
  # Networking
  dio: ^5.3.0
  web_socket_channel: ^3.0.0
  mqtt_client: ^9.0.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Utilities
  get_it: ^7.6.0
  intl: ^0.18.1
  
  # Error Handling
  dartz: ^0.10.1
  
  # JSON Serialization
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # JSON Code Generation
  build_runner: ^2.4.0
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
